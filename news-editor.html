<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北沢小西 お知らせ作成ツール</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:#111;color:#fff;margin:0;padding:24px;line-height:1.8}.wrap{max-width:860px;margin:auto}h1{font-size:24px}label{display:block;margin:18px 0 6px;color:#ddd}input,textarea{width:100%;box-sizing:border-box;border:1px solid #444;background:#1b1b1b;color:#fff;border-radius:10px;padding:12px;font-size:16px}textarea{min-height:90px}button{margin:16px 8px 0 0;border:1px solid #eee;background:#fff;color:#111;border-radius:999px;padding:12px 18px;font-weight:700;cursor:pointer}.ghost{background:transparent;color:#fff}.item{border:1px solid #333;border-radius:14px;padding:16px;margin:12px 0;background:#181818}.small{color:#aaa;font-size:13px}pre{white-space:pre-wrap;background:#000;border:1px solid #333;border-radius:14px;padding:16px}.danger{border-color:#7a3333;color:#ffb2b2}.copy{background:#f5c84c;color:#111;border:0}</style>
</head>
<body>
<div class="wrap">
<h1>北沢小西 お知らせ作成ツール</h1>
<p>HTMLは触らず、ここでお知らせを作って <strong>news.json</strong> に保存する内容を作れます。</p>
<p class="small">使い方：日付と文章を入力 →「追加」→「JSONをコピー」→ サーバー上の <strong>news.json</strong> を開いて中身を貼り替えます。</p>
<label>日付</label><input id="date" placeholder="例：2026.06.21">
<label>お知らせ本文</label><textarea id="text" placeholder="例：営業時間を更新しました。"></textarea>
<button onclick="addNews()">追加</button><button class="ghost" onclick="clearForm()">入力欄を空にする</button>
<h2>作成中のお知らせ</h2><div id="list"></div>
<button class="copy" onclick="copyJson()">JSONをコピー</button><button class="ghost danger" onclick="resetAll()">すべて削除</button>
<h2>news.json に貼る内容</h2><pre id="output">[]</pre>
</div>
<script>
let news=[];
function render(){
 const list=document.getElementById('list');
 list.innerHTML=news.map((n,i)=>`<div class="item"><strong>${n.date}</strong><br>${escapeHtml(n.text)}<br><button class="ghost" onclick="removeNews(${i})">削除</button></div>`).join('')||'<p class="small">まだありません。</p>';
 document.getElementById('output').textContent=JSON.stringify(news,null,2);
}
function addNews(){
 const date=document.getElementById('date').value.trim();
 const text=document.getElementById('text').value.trim();
 if(!date||!text){alert('日付と本文を入力してください。');return;}
 news.unshift({date,text}); clearForm(); render();
}
function removeNews(i){news.splice(i,1);render();}
function resetAll(){if(confirm('すべて削除しますか？')){news=[];render();}}
function clearForm(){document.getElementById('date').value='';document.getElementById('text').value='';}
function copyJson(){navigator.clipboard.writeText(document.getElementById('output').textContent).then(()=>alert('コピーしました。news.jsonに貼り付けてください。'));}
function escapeHtml(str){return str.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
const d=new Date();
document.getElementById('date').value=d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');
render();
</script>
</body>
</html>
